services:
  postgres:
    image: postgres:16-alpine
    container_name: todos-postgres
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: todos
      POSTGRES_PASSWORD: todos
    ports:
      - "5432:5432"
    volumes:
      - todos-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todos -d tododb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  todos-pgdata:
